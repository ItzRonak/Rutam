version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3
    container_name: rutam-postgis
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rutam
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
  brouter:
    image: ghcr.io/abrensch/brouter
    container_name: rutam-brouter
    ports:
      - "17777:17777"
    volumes:
      - ../data/brouter-segments:/segments4
      - ../data/brouter-segments/lookups.dat:/brouter/lookups.dat
      - ../data/brouter-segments/lookups.dat:/profiles2/lookups.dat

    # Mock S3 for Audit Persistence
  s3-minio:
    image: minio/minio
    container_name: rutam-s3
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      - MINIO_ROOT_USER=rutam_admin
      - MINIO_ROOT_PASSWORD=rutam_password
    command: server /data --console-address ":9001"
    volumes:
      - s3-data:/data

volumes:
  postgis-data:
  s3-data:
